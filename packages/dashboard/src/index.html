<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Keel Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      width: 100%;
      padding: 1.5rem 2rem;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 1.5rem; font-weight: 700; }
    header h1 span { color: #38bdf8; }
    .status { display: flex; gap: 0.75rem; align-items: center; }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .dot.green { background: #22c55e; }
    .dot.yellow { background: #eab308; }
    .dot.red { background: #ef4444; }
    main {
      width: 100%;
      max-width: 1200px;
      padding: 2rem;
      flex: 1;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .card h2 { font-size: 1.25rem; margin-bottom: 1rem; color: #38bdf8; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem; }
    .stat {
      background: #0f172a;
      border-radius: 8px;
      padding: 1rem;
      text-align: center;
    }
    .stat .value { font-size: 2rem; font-weight: 700; color: #38bdf8; }
    .stat .label { font-size: 0.875rem; color: #94a3b8; margin-top: 0.25rem; }
    .auth-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: #38bdf8;
      color: #0f172a;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .auth-btn:hover { background: #7dd3fc; }
    .auth-btn.github { background: #24292e; color: white; }
    .auth-btn.github:hover { background: #444d56; }
    .auth-section { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 1rem; }
    footer {
      width: 100%;
      padding: 1rem 2rem;
      background: #1e293b;
      border-top: 1px solid #334155;
      text-align: center;
      font-size: 0.875rem;
      color: #64748b;
    }
  </style>
</head>
<body>
  <header>
    <h1>⚓ <span>Keel</span> Dashboard</h1>
    <div class="status">
      <span id="gw-status"><span class="dot yellow"></span> Gateway</span>
      <span id="rt-status"><span class="dot yellow"></span> Realtime</span>
    </div>
  </header>
  <main>
    <div id="auth-panel" class="card">
      <h2>Sign In</h2>
      <p style="margin-bottom: 1rem; color: #94a3b8;">
        Connect your account to get started with Keel.
      </p>
      <div class="auth-section">
        <a href="/api/v1/auth/google" class="auth-btn">🔵 Sign in with Google</a>
        <a href="/api/v1/auth/github" class="auth-btn github">🐙 Sign in with GitHub</a>
      </div>
    </div>

    <div id="project-panel" class="card" style="display: none;">
      <h2>Projects</h2>
      <div id="project-list" style="margin-top: 1rem;">
        <p style="color: #64748b;">Loading...</p>
      </div>
      <div style="margin-top: 1rem;">
        <button id="create-project-btn" class="auth-btn" style="font-size: 0.875rem;">
          + New Project
        </button>
      </div>
    </div>

    <div class="grid">
      <div class="card stat">
        <div class="value" id="stat-gateway">—</div>
        <div class="label">Gateway Status</div>
      </div>
      <div class="card stat">
        <div class="value" id="stat-version">v0.1.0</div>
        <div class="label">Version</div>
      </div>
      <div class="card stat">
        <div class="value" id="stat-uptime">—</div>
        <div class="label">Serving Since</div>
      </div>
    </div>
  </main>
  <footer>
    Keel v0.1.0 · Built with ❤️
  </footer>

  <script type="module">
    const API_BASE = '/api/v1';

    // Check if already authenticated
    const token = localStorage.getItem('keel_token');
    if (token) {
      document.getElementById('auth-panel').style.display = 'none';
      document.getElementById('project-panel').style.display = '';
      loadProjects();
    }

    // Check gateway health
    async function checkHealth() {
      try {
        const res = await fetch(API_BASE + '/health');
        const data = await res.json();
        const statusEl = document.getElementById('gw-status');
        if (data.data && data.data.status === 'healthy') {
          statusEl.innerHTML = '<span class="dot green"></span> Gateway';
          document.getElementById('stat-gateway').textContent = 'Online';
        } else {
          statusEl.innerHTML = '<span class="dot yellow"></span> Gateway';
          document.getElementById('stat-gateway').textContent = 'Degraded';
        }
      } catch {
        document.getElementById('gw-status').innerHTML = '<span class="dot red"></span> Gateway';
        document.getElementById('stat-gateway').textContent = 'Offline';
      }
    }

    // Load projects
    async function loadProjects() {
      if (!token) return;
      try {
        const res = await fetch(API_BASE + '/projects', {
          headers: { Authorization: 'Bearer ' + token },
        });
        const data = await res.json();
        const list = document.getElementById('project-list');
        if (data.data && data.data.length > 0) {
          list.innerHTML = data.data.map(p =>
            `<div style="padding: 0.75rem 0; border-bottom: 1px solid #334155;">
              <strong>${p.name}</strong>
              <span style="color: #64748b; margin-left: 0.5rem;">${p.slug}</span>
              <span style="float: right; color: #64748b; font-size: 0.75rem;">${new Date(p.created_at).toLocaleDateString()}</span>
            </div>`
          ).join('');
        } else {
          list.innerHTML = '<p style="color: #64748b;">No projects yet. Create one to get started.</p>';
        }
      } catch (err) {
        console.error('Failed to load projects:', err);
      }
    }

    // Create project handler
    document.getElementById('create-project-btn')?.addEventListener('click', async () => {
      const name = prompt('Project name:');
      if (!name) return;
      try {
        const res = await fetch(API_BASE + '/projects', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: 'Bearer ' + token,
          },
          body: JSON.stringify({ name }),
        });
        const data = await res.json();
        if (res.ok && data.data) {
          alert(`Project created!\n\nAPI Key: ${data.data.api_key}\n\nSave this key — you won't see it again!`);
          loadProjects();
        } else {
          alert('Error: ' + (data.error?.message || 'Failed to create project'));
        }
      } catch (err) {
        alert('Error: ' + err.message);
      }
    });

    // Handle OAuth callback (token in URL fragment)
    window.addEventListener('load', () => {
      const hash = window.location.hash.slice(1);
      if (hash) {
        try {
          const params = new URLSearchParams(hash);
          const accessToken = params.get('access_token');
          const refreshToken = params.get('refresh_token');
          if (accessToken) {
            localStorage.setItem('keel_token', accessToken);
            if (refreshToken) localStorage.setItem('keel_refresh_token', refreshToken);
            window.location.hash = '';
            window.location.reload();
          }
        } catch {}
      }
    });

    checkHealth();
    setInterval(checkHealth, 30000);
  </script>
</body>
</html>
