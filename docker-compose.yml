name: keel

services:
  postgres:
    image: postgres:16-alpine
    container_name: keel-postgres
    environment:
      POSTGRES_DB: keel_master
      POSTGRES_USER: keel
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    ports:
      - "127.0.0.1:6543:5432"
    volumes:
      - keel_pg_data:/var/lib/postgresql/data
      - ./packages/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keel -d keel_master"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: packages/gateway/Dockerfile
    container_name: keel-gateway
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: "postgresql://keel:${POSTGRES_PASSWORD}@postgres:5432/keel_master"
      JWT_SECRET: "${JWT_SECRET}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY}"
      ADMIN_EMAIL: "${ADMIN_EMAIL}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  realtime:
    build:
      context: .
      dockerfile: packages/realtime/Dockerfile
    container_name: keel-realtime
    environment:
      PORT: "3001"
      DATABASE_URL: "postgresql://keel:${POSTGRES_PASSWORD}@postgres:5432/keel_master"
      JWT_SECRET: "${JWT_SECRET}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: packages/worker/Dockerfile
    container_name: keel-worker
    environment:
      DATABASE_URL: "postgresql://keel:${POSTGRES_PASSWORD}@postgres:5432/keel_master"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: keel-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./packages/dashboard/dist:/usr/share/nginx/html:ro
    restart: unless-stopped

volumes:
  keel_pg_data:
