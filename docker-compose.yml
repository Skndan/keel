name: keel

services:
  postgres:
    image: postgres:16-alpine
    container_name: keel-postgres
    environment:
      POSTGRES_DB: keel_master
      POSTGRES_USER: keel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-keel_dev}
    ports:
      - "127.0.0.1:6543:5432"
    volumes:
      - keel_pg_data:/var/lib/postgresql/data
      - ./packages/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keel -d keel_master"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: packages/gateway/Dockerfile
    container_name: keel-gateway
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://keel:${POSTGRES_PASSWORD:-keel_dev}@postgres:5432/keel_master
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-keel_dev}
      JWT_SECRET: ${JWT_SECRET:-changeme}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-changeme}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@skndan.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  realtime:
    build:
      context: .
      dockerfile: packages/realtime/Dockerfile
    container_name: keel-realtime
    environment:
      PORT: 3001
      DATABASE_URL: postgres://keel:${POSTGRES_PASSWORD:-keel_dev}@postgres:5432/keel_master
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-keel_dev}
      JWT_SECRET: ${JWT_SECRET:-changeme}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: packages/worker/Dockerfile
    container_name: keel-worker
    environment:
      DATABASE_URL: postgres://keel:${POSTGRES_PASSWORD:-keel_dev}@postgres:5432/keel_master
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-keel_dev}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5302/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: keel-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - keel_caddy_data:/data
      - keel_caddy_config:/config
    restart: unless-stopped

volumes:
  keel_pg_data:
  keel_caddy_data:
  keel_caddy_config:
